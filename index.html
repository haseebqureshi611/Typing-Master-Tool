<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TypeMaster | Live Typing Test Tool</title>
 
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #F9FAFB;
      color: #111827;
      transition: background 0.3s, color 0.2s;
    }

   
    body.dark {
      background: #0F172A;
      color: #E2E8F0;
    }
    body.dark .card, body.dark .result-card, body.dark .history-card {
      background: #1E293B;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
    }
    body.dark .typing-area {
      background: #0F172A;
      border-color: #334155;
    }
    body.dark .stats-box {
      background: #334155;
    }
    body.dark footer {
      background: #111827;
      border-top-color: #1E293B;
    }

  
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

 
    .sticky-header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      z-index: 100;
      transition: background 0.3s;
      border-bottom: 1px solid rgba(79,70,229,0.1);
    }
    body.dark .sticky-header {
      background: rgba(15,23,42,0.9);
      backdrop-filter: blur(12px);
      border-bottom-color: #334155;
    }
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      flex-wrap: wrap;
    }
    .logo h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #4F46E5, #22C55E);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      align-items: center;
    }
    .nav-links a {
      text-decoration: none;
      font-weight: 500;
      color: #1F2937;
      transition: color 0.2s;
    }
    body.dark .nav-links a {
      color: #CBD5E1;
    }
    .nav-links a:hover {
      color: #4F46E5;
    }
    .dark-toggle {
      background: #E5E7EB;
      border: none;
      padding: 0.5rem 0.8rem;
      border-radius: 2rem;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }
    body.dark .dark-toggle {
      background: #334155;
      color: white;
    }

   
    .main-card {
      margin: 2rem 0;
    }
    .card, .result-card {
      background: white;
      border-radius: 1.5rem;
      padding: 1.8rem;
      box-shadow: 0 20px 35px -10px rgba(0,0,0,0.08);
      transition: all 0.2s;
    }
    .section-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .paragraph-display {
      background: #F3F4F6;
      padding: 1.5rem;
      border-radius: 1rem;
      font-size: 1.2rem;
      line-height: 1.6;
      letter-spacing: 0.3px;
      margin-bottom: 1.5rem;
      word-break: break-word;
      white-space: pre-wrap;
      font-weight: 500;
      border-left: 5px solid #4F46E5;
    }
    body.dark .paragraph-display {
      background: #0F172A;
    }
    .typing-area {
      width: 100%;
      padding: 1.2rem;
      font-size: 1.1rem;
      border-radius: 1rem;
      border: 2px solid #E5E7EB;
      background: white;
      resize: vertical;
      font-family: monospace;
      transition: 0.2s;
    }
    body.dark .typing-area {
      background: #1E293B;
      border-color: #475569;
      color: #F1F5F9;
    }
    .typing-area:focus {
      outline: none;
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.2);
    }
    .stats-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1.5rem 0 1rem;
      justify-content: space-between;
    }
    .stats-box {
      background: #F3F4F6;
      border-radius: 1rem;
      padding: 0.8rem 1.2rem;
      text-align: center;
      flex: 1;
      min-width: 100px;
      transition: transform 0.1s;
    }
    .stats-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      color: #6B7280;
    }
    .stats-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: #4F46E5;
    }
    .progress-bar {
      width: 100%;
      height: 10px;
      background: #E5E7EB;
      border-radius: 10px;
      margin: 1rem 0;
      overflow: hidden;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: #22C55E;
      transition: width 0.2s ease;
    }
    .btn-group {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
    .btn-primary {
      background: #4F46E5;
      color: white;
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary:hover {
      background: #4338CA;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px -6px rgba(79,70,229,0.4);
    }
    .btn-secondary {
      background: #E5E7EB;
      color: #1F2937;
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary:hover {
      background: #D1D5DB;
    }
    .result-card {
      margin-top: 2rem;
      background: #FEFCE8;
      border-left: 6px solid #22C55E;
    }
    .history-section {
      margin: 2rem 0;
    }
    .history-list {
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .history-item {
      background: #F9FAFB;
      border-radius: 1rem;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      border: 1px solid #E5E7EB;
    }
    body.dark .history-item {
      background: #1E293B;
      border-color: #334155;
    }
    footer {
      background: white;
      margin-top: 3rem;
      padding: 2rem 0;
      text-align: center;
      border-top: 1px solid #E5E7EB;
    }
    body.dark footer {
      background: #0F172A;
    }
    .social-icons a {
      color: #4B5563;
      margin: 0 0.6rem;
      font-size: 1.4rem;
      transition: color 0.2s;
    }
    body.dark .social-icons a {
      color: #94A3B8;
    }
    .social-icons a:hover {
      color: #4F46E5;
    }
    .highlight-correct {
      background-color: #22C55E30;
      color: #166534;
      border-radius: 4px;
    }
    .highlight-incorrect {
      background-color: #EF444430;
      color: #B91C1C;
      text-decoration: underline;
      border-radius: 4px;
    }
    .inline-highlight {
      font-family: monospace;
      font-size: 1.1rem;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
    }
    @media (max-width: 700px) {
      .navbar {
        flex-direction: column;
        gap: 0.8rem;
      }
      .stats-value {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>

<header class="sticky-header">
  <div class="container">
    <div class="navbar">
      <div class="logo">
        <h1><i class="fas fa-keyboard"></i> TypeMaster</h1>
      </div>
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <button class="dark-toggle" id="darkModeToggle"><i class="fas fa-moon"></i> Dark Mode</button>
      </div>
    </div>
  </div>
</header>

<main class="container">
  <div class="main-card">
    <div class="card">
      <div class="section-title">
        <i class="fas fa-tachometer-alt" style="color:#4F46E5;"></i> 
        <span>Live Typing Test</span>
      </div>
 
      <div class="paragraph-display" id="paragraphDisplay"></div>
      
      <textarea id="typingInput" class="typing-area" rows="4" placeholder="Start typing here..." disabled></textarea>
      
      <div class="stats-grid">
        <div class="stats-box"><div class="stats-label">⏱️ Timer</div><div class="stats-value" id="timerValue">60</div></div>
        <div class="stats-box"><div class="stats-label">⚡ WPM</div><div class="stats-value" id="wpmValue">0</div></div>
        <div class="stats-box"><div class="stats-label">🎯 Accuracy</div><div class="stats-value" id="accuracyValue">100</div><span>%</span></div>
        <div class="stats-box"><div class="stats-label">❌ Mistakes</div><div class="stats-value" id="mistakeValue">0</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="btn-group">
        <button id="startRestartBtn" class="btn-primary"><i class="fas fa-play"></i> Start Test</button>
        <button id="tryAgainBtn" class="btn-secondary"><i class="fas fa-sync-alt"></i> Try Again</button>
      </div>
    </div>

   
    <div id="resultPanel" style="display: none;" class="result-card">
      <div class="section-title"><i class="fas fa-chart-line"></i> Your Results</div>
      <div id="resultContent"></div>
      <button id="closeResultBtn" class="btn-primary" style="margin-top:1rem;">New Test</button>
    </div>

   
    <div class="history-section">
      <div class="card">
        <div class="section-title"><i class="fas fa-history"></i> Recent Scores & Leaderboard</div>
        <div id="historyList" class="history-list">
          <div style="text-align:center; padding:1rem;">No past results yet. Complete a test!</div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p>© 2026 TypeMaster | Built by Developer</p>
    <div class="social-icons" style="margin-top: 0.8rem;">
      <a href="#"><i class="fab fa-github"></i></a>
      <a href="#"><i class="fab fa-linkedin"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
    </div>
    <p style="margin-top: 0.8rem; font-size:0.8rem;">⚡ Instant WPM · Real-time Accuracy · Mistake Tracker</p>
  </div>
</footer>

<script>

  const PARAGRAPHS = [
    "The quick brown fox jumps over the lazy dog. Typing fast requires consistent practice and focus. Master your keyboard with daily drills.",
    "Programming is the art of telling another human what one wants the computer to do. Clean code is simple and direct.",
    "User experience design shapes how people interact with digital products. A smooth interface makes typing tests enjoyable and effective.",
    "JavaScript enables dynamic web applications. With asynchronous patterns you build responsive and powerful tools like TypeMaster.",
    "Consistency is key to improving typing speed. Track your WPM, reduce errors, and challenge yourself daily to become a typist hero."
  ];
  
  function getRandomParagraph() {
    return PARAGRAPHS[Math.floor(Math.random() * PARAGRAPHS.length)];
  }
  
 
  let currentParagraph = "";
  let originalWordsArray = [];   
  let testActive = false;
  let timerInterval = null;
  let timeLeft = 60;          
  let startTimestamp = null;
  let mistakesCount = 0;
  let totalTypedChars = 0;
  let correctChars = 0;
  let lastInputValue = "";
  

  const paragraphDisplayDiv = document.getElementById("paragraphDisplay");
  const typingInput = document.getElementById("typingInput");
  const timerValueSpan = document.getElementById("timerValue");
  const wpmValueSpan = document.getElementById("wpmValue");
  const accuracyValueSpan = document.getElementById("accuracyValue");
  const mistakeValueSpan = document.getElementById("mistakeValue");
  const progressFill = document.getElementById("progressFill");
  const startRestartBtn = document.getElementById("startRestartBtn");
  const tryAgainBtn = document.getElementById("tryAgainBtn");
  const resultPanel = document.getElementById("resultPanel");
  const resultContentDiv = document.getElementById("resultContent");
  const closeResultBtn = document.getElementById("closeResultBtn");
  const historyListDiv = document.getElementById("historyList");
  

  function updateStatsUI() {
    
    let elapsedSec = 60 - timeLeft;
    if (!testActive) elapsedSec = 60 - timeLeft;
    if (elapsedSec <= 0) elapsedSec = 1;
    let rawWPM = (correctChars / 5) / (elapsedSec / 60);
    let wpm = Math.floor(rawWPM >= 0 ? rawWPM : 0);
    wpmValueSpan.innerText = wpm;
    
    let accuracyPercent = totalTypedChars === 0 ? 100 : (correctChars / totalTypedChars) * 100;
    accuracyValueSpan.innerText = Math.floor(accuracyPercent);
    mistakeValueSpan.innerText = mistakesCount;
   
    let paraLen = currentParagraph.length;
    let typedLen = typingInput.value.length;
    let progress = paraLen === 0 ? 0 : (typedLen / paraLen) * 100;
    progressFill.style.width = Math.min(100, progress) + "%";
  }
  

  function updateHighlight() {
    const typed = typingInput.value;
    const original = currentParagraph;
    let highlightedHtml = "";
    for (let i = 0; i < original.length; i++) {
      if (i < typed.length) {
        if (typed[i] === original[i]) {
          highlightedHtml += `<span class="highlight-correct">${escapeHtml(original[i])}</span>`;
        } else {
          highlightedHtml += `<span class="highlight-incorrect">${escapeHtml(original[i])}</span>`;
        }
      } else {
        highlightedHtml += escapeHtml(original[i]);
      }
    }
    paragraphDisplayDiv.innerHTML = `<div class="inline-highlight">${highlightedHtml}</div>`;
  }
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }
  

  function recomputeStats() {
    const typed = typingInput.value;
    const original = currentParagraph;
    let mistakes = 0;
    let correct = 0;
    let total = typed.length;
    for (let i = 0; i < typed.length && i < original.length; i++) {
      if (typed[i] === original[i]) correct++;
      else mistakes++;
    }
   
    if (typed.length > original.length) {
      mistakes += (typed.length - original.length);
    }
    mistakesCount = mistakes;
    totalTypedChars = total;
    correctChars = correct;
    updateStatsUI();
    updateHighlight();
  }
  
  
  function onTypeInput(e) {
    if (!testActive) return;
    const currentVal = typingInput.value;
    
    recomputeStats();
  
    if (currentVal.length >= currentParagraph.length && testActive && timeLeft > 0) {

      if (currentVal.length === currentParagraph.length) {
        
        endTestEarly();
      }
    }
  }
  
  function endTestEarly() {
    if (testActive && timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
      testActive = false;
      typingInput.disabled = true;
      showResultsAndSave();
    }
  }
  
  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (testActive && timeLeft > 0) {
        timeLeft--;
        timerValueSpan.innerText = timeLeft;
        if (timeLeft === 0) {
          // time's up
          clearInterval(timerInterval);
          timerInterval = null;
          testActive = false;
          typingInput.disabled = true;
          showResultsAndSave();
        }
        updateStatsUI(); 
      } else if (timeLeft <= 0) {
        clearInterval(timerInterval);
      }
    }, 1000);
  }
  
  function resetTestUI(resetParagraph = true) {
    if (timerInterval) clearInterval(timerInterval);
    testActive = false;
    timeLeft = 60;
    mistakesCount = 0;
    totalTypedChars = 0;
    correctChars = 0;
    timerValueSpan.innerText = "60";
    wpmValueSpan.innerText = "0";
    accuracyValueSpan.innerText = "100";
    mistakeValueSpan.innerText = "0";
    progressFill.style.width = "0%";
    typingInput.disabled = false;
    typingInput.value = "";
    if (resetParagraph) {
      currentParagraph = getRandomParagraph();
    }
    updateHighlight();
    recomputeStats();
    resultPanel.style.display = "none";
  }
  
  function startTest() {
    resetTestUI(true);
    testActive = true;
    typingInput.disabled = false;
    typingInput.value = "";
    typingInput.focus();
    timeLeft = 60;
    mistakesCount = 0;
    totalTypedChars = 0;
    correctChars = 0;
    updateStatsUI();
    updateHighlight();
    startTimer();
  }
  

  function showResultsAndSave() {
    if (!testActive && timerInterval === null && (timeLeft === 0 || typingInput.value.length === currentParagraph.length)) {
      // compute final metrics
      const elapsed = 60 - timeLeft;
      let finalWPM = 0;
      if (elapsed > 0) finalWPM = Math.floor((correctChars / 5) / (elapsed / 60));
      else finalWPM = 0;
      let finalAccuracy = totalTypedChars === 0 ? 100 : (correctChars / totalTypedChars) * 100;
      finalAccuracy = Math.floor(finalAccuracy);
      const finalMistakes = mistakesCount;
      const dateNow = new Date().toISOString();
      
      const resultObj = {
        wpm: finalWPM,
        accuracy: finalAccuracy,
        mistakes: finalMistakes,
        date: dateNow
      };
      
      let savedResults = JSON.parse(localStorage.getItem("typing_results") || "[]");
      savedResults.unshift(resultObj);
      if (savedResults.length > 10) savedResults.pop();
      localStorage.setItem("typing_results", JSON.stringify(savedResults));
      
      resultContentDiv.innerHTML = `
        <p><strong>📝 WPM:</strong> ${finalWPM}</p>
        <p><strong>🎯 Accuracy:</strong> ${finalAccuracy}%</p>
        <p><strong>❌ Mistakes:</strong> ${finalMistakes}</p>
        <p><strong>⏱️ Time taken:</strong> ${elapsed} seconds</p>
      `;
      resultPanel.style.display = "block";
      
      
      loadHistoryAndLeaderboard();
    } else {
    
      const elapsed = 60 - timeLeft;
      let finalWPM = Math.floor((correctChars / 5) / (Math.max(elapsed,1) / 60));
      let finalAccuracy = totalTypedChars === 0 ? 100 : (correctChars / totalTypedChars) * 100;
      const finalMistakes = mistakesCount;
      const dateNow = new Date().toISOString();
      const fallbackObj = { wpm: finalWPM, accuracy: Math.floor(finalAccuracy), mistakes: finalMistakes, date: dateNow };
      let savedResults = JSON.parse(localStorage.getItem("typing_results") || "[]");
      savedResults.unshift(fallbackObj);
      localStorage.setItem("typing_results", JSON.stringify(savedResults.slice(0,10)));
      resultContentDiv.innerHTML = `<p><strong>WPM:</strong> ${finalWPM}</p><p><strong>Accuracy:</strong> ${Math.floor(finalAccuracy)}%</p><p><strong>Mistakes:</strong> ${finalMistakes}</p>`;
      resultPanel.style.display = "block";
      loadHistoryAndLeaderboard();
    }
  }
  
  function loadHistoryAndLeaderboard() {
    const results = JSON.parse(localStorage.getItem("typing_results") || "[]");
    if (results.length === 0) {
      historyListDiv.innerHTML = '<div style="text-align:center; padding:1rem;">✨ No history yet. Take a typing test! ✨</div>';
      return;
    }
    let html = "";
    
    const sortedByWpm = [...results].sort((a,b)=>b.wpm - a.wpm).slice(0,5);
    html += `<div style="margin-bottom:0.8rem;"><i class="fas fa-trophy" style="color:#F59E0B;"></i> <strong>🏆 Leaderboard (Top WPM)</strong></div>`;
    sortedByWpm.forEach((item, idx) => {
      const dateShort = new Date(item.date).toLocaleString();
      html += `<div class="history-item"><span>${idx+1}. WPM: ${item.wpm} &nbsp;| Acc: ${item.accuracy}% | ❌ ${item.mistakes}</span><span style="font-size:0.7rem;">${dateShort}</span></div>`;
    });
    html += `<div style="margin:1rem 0 0.5rem 0;"><i class="fas fa-clock"></i> <strong>📋 Recent Attempts</strong></div>`;
    results.slice(0,5).forEach((item, idx) => {
      const dateShort = new Date(item.date).toLocaleString();
      html += `<div class="history-item"><span>⚡ ${item.wpm} WPM &nbsp;• ${item.accuracy}% acc &nbsp;• ${item.mistakes} errors</span><span>${dateShort}</span></div>`;
    });
    historyListDiv.innerHTML = html;
  }
  
 
  function tryAgainHandler() {
    if (timerInterval) clearInterval(timerInterval);
    resetTestUI(true);
    testActive = false;
    typingInput.disabled = false;
    typingInput.value = "";
    timeLeft = 60;
    mistakesCount = 0;
    totalTypedChars = 0;
    correctChars = 0;
    updateStatsUI();
    updateHighlight();
    timerValueSpan.innerText = "60";
    resultPanel.style.display = "none";
    typingInput.focus();
    
  }
  
  startRestartBtn.addEventListener("click", () => {
    if (testActive) {
      
      if (timerInterval) clearInterval(timerInterval);
      resetTestUI(true);
      testActive = false;
    }
    startTest();
  });
  
  tryAgainBtn.addEventListener("click", () => {
    tryAgainHandler();
  });
  
  closeResultBtn.addEventListener("click", () => {
    resultPanel.style.display = "none";
    resetTestUI(true);
    typingInput.disabled = false;
    testActive = false;
    typingInput.value = "";
    updateStatsUI();
    timerValueSpan.innerText = "60";
  });
  
  typingInput.addEventListener("input", onTypeInput);

  const darkToggle = document.getElementById("darkModeToggle");
  darkToggle.addEventListener("click", () => {
    document.body.classList.toggle("dark");
    const icon = darkToggle.querySelector("i");
    if (document.body.classList.contains("dark")) {
      icon.classList.remove("fa-moon");
      icon.classList.add("fa-sun");
    } else {
      icon.classList.remove("fa-sun");
      icon.classList.add("fa-moon");
    }
  });
  
  
  function init() {
    currentParagraph = getRandomParagraph();
    updateHighlight();
    typingInput.disabled = false;
    typingInput.value = "";
    testActive = false;
    timeLeft = 60;
    updateStatsUI();
    loadHistoryAndLeaderboard();
    resultPanel.style.display = "none";
  }
  init();
</script>
</body>
</html>
